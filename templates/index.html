<!DOCTYPE html>
<html>
<head>
    <title>Password Checker</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            margin-top: 100px;
        }
        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .strong { color: green; }
        .medium { color: orange; }
        .weak { color: red; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Password Checker 🔐</h2>

        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" required>
            <br>
            <button type="submit">Check</button>
        </form>

        {% if result %}
            <h3 class="{{ strength }}">{{ result }}</h3>
        {% endif %}
    </div>

</body>
</html>
